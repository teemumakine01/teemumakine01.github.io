<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="author" content="">
    <meta name="theme-color" content="">
    <title>IP Address Tracker</title>

    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">

    <!-- main page css -->
    <link href="./css/main.css" rel="stylesheet">

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600&display=swap" rel="stylesheet">  

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A==" crossorigin="">

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin=""></script>
    <script type="module" src="scripts/index.js"></script>

  </head>
  <body>
    <header class="top-container">
      <h1 class="main-heading">IP Address Tracker</h1>

      <form class="form" novalidate>
        <input type="text" class="input" placeholder="Search for any IP address or domain" aria-label="Type IP address or Domain name">
        <button class="submit-btn" type="submit" aria-label="Hit Search"></button>
      </form>

      <dl class="user-data-list">
        <div class="user-data-item">
          <dt class="data-term">IP Address</dt>
          <dd class="data-value"></dd>
        </div>

        <div class="user-data-item">
          <dt class="data-term">Location</dt>
          <dd class="data-value"></dd>
        </div>

        <div class="user-data-item">
          <dt class="data-term">Timezone</dt>
          <dd class="data-value"></dd>
        </div>

        <div class="user-data-item">
          <dt class="data-term">ISP</dt>
          <dd class="data-value"></dd>
        </div>
      </dl>
    </header>

    <div id="map">
      <h1 class="loading-text">Loading...</h1>
    </div>
  </body>
</html>
