<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta content="initial-scale=1, minimum-scale=1, width=device-width" name="viewport">
    <title>404 Not Found</title>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Bai+Jamjuree&display=swap');
      :root {
        --light:#e9e9e9;
        --dark: #252525;
        --link: #6CA6C1;
      }
      html {
        font-family: 'Bai Jamjuree', sans-serif;
        font-size: 16px;
        background: var(--dark);
        color: var(--light);
        line-height: 1.54;
      }
      .error {
        position: absolute;
        top: 30%;
        left: 50%;
        -moz-transform: translateX(-50%) translateY(-50%);
        -webkit-transform: translateX(-50%) translateY(-50%);
        transform: translateX(-50%) translateY(-50%);
      }
      h2 {
        font-weight: 400;
      }
      a {
        color: var(--link);
        text-decoration: none;
        cursor: pointer;
      }
      a:hover {
        text-decoration: underline;
      }
      @media screen and (max-width: 750px) {
        html {
          font-size: 14px;
        }
        h2 {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="error">
      <h2>404 Not Found</h2>
      <p>This is not the web page you are looking for. <a href="https://tprojects.me">Return home</a></p>
    </div>
  </body>
</html>
